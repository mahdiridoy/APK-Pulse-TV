name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Find Project Root & Build APK
        run: |
          # Locate directory containing package.json
          PKG_PATH=$(find . -maxdepth 3 -name "package.json" -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$PKG_PATH" ]; then
            echo "Error: package.json not found in repository!"
            exit 1
          fi
          PROJECT_DIR=$(dirname "$PKG_PATH")
          echo "Found project directory at: $PROJECT_DIR"
          cd "$PROJECT_DIR"

          # 1. Install dependencies
          npm install

          # 2. Build web application
          npm run build

          # 3. Setup Capacitor Android platform
          npx cap init "ApkPulse Stream" "com.apkpulse.stream" --web-dir "dist" || true
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

          # 4. Build Android Debug APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ApkPulse-Stream-Debug-APK
          path: "**/android/app/build/outputs/apk/debug/ApkPulseStream.apk"

