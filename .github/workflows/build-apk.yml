name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project (if uploaded as a zip)
        run: |
          echo "Repo root contents:"
          ls -la
          ZIPFILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIPFILE" ]; then
            echo "Found zip: $ZIPFILE"
            unzip -o "$ZIPFILE"
          else
            echo "No zip file found in repo root."
          fi
          echo "After unzip:"
          ls -la

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: |
          PROJECT_DIR=$(dirname "$(find . -maxdepth 3 -iname "settings.gradle.kts" | head -n 1)")
          echo "Building in: $PROJECT_DIR"
          cd "$PROJECT_DIR"
          gradle assembleDebug --no-daemon

      - name: Locate built APK
        id: findapk
        run: |
          APK_PATH=$(find . -iname "app-debug.apk" | head -n 1)
          echo "Found APK at: $APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-app-debug-apk
          path: ${{ steps.findapk.outputs.path }}

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: IPTV App build ${{ github.run_number }}
          files: ${{ steps.findapk.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
