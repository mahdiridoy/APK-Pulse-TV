name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Find Project Root & Build APK
        run: |
          echo "=== Repository Structure ==="
          ls -la
          echo "==========================="

          # If package.json isn't present, check for zip archives and unzip them
          if [ ! -f "package.json" ]; then
            ZIP_FILE=$(find . -maxdepth 2 -name "*.zip" | head -n 1)
            if [ -n "$ZIP_FILE" ]; then
              echo "Found zip file: $ZIP_FILE. Unzipping project files..."
              unzip -o "$ZIP_FILE"
            fi
          fi

          # Locate directory containing package.json anywhere in repository
          PKG_PATH=$(find . -name "package.json" -not -path "*/node_modules/*" | head -n 1)

          if [ -z "$PKG_PATH" ]; then
            echo "Error: package.json not found in repository!"
            echo "Directory contents tree:"
            find . -maxdepth 4 -not -path '*/.*' -not -path '*/node_modules*'
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PKG_PATH")
          echo "Found package.json at: $PKG_PATH"
          echo "Switching to project directory: $PROJECT_DIR"
          cd "$PROJECT_DIR"

          # 1. Install dependencies
          npm install

          # 2. Build web application
          npm run build

          # 3. Setup Capacitor Android platform
          npx cap init "ApkPulse Stream" "com.apkpulse.stream" --web-dir "dist" || true
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

          # 4. Build Android Debug APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ApkPulse-Stream-Debug-APK
          path: "**/android/app/build/outputs/apk/debug/app-debug.apk"

